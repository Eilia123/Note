<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note</title>
    <link rel="stylesheet" href="stayle/stayle.css">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <header>
        <div class="menu"><button class="icon-menu"><ion-icon class="icon" name="menu-outline"></ion-icon></button> </div> 

        <section class="text-header">
        <span>Notepad</span>
        </section>

        <section class="header-icon">
            <input type="search" class="search-box" placeholder="search..." >
            <button class="btn-header btn-search"><ion-icon class="icon" name="search-outline"></ion-icon></button>
            <button class="btn-header"><ion-icon class="icon" name="refresh-outline"></ion-icon></button>
            <button class="btn-header"><ion-icon class="icon" name="settings-outline" ></ion-icon></button>
            <button class="btn-header"><ion-icon class="icon" name="apps-outline"></ion-icon></button>
            <button class="btn-header"><img src="" alt=""></button>
        </section>
    </header>

    <nav>
    <div class="text-nav"> <button class="btn-nav special"><ion-icon class="icon" name="book-outline"></ion-icon></button><span> Notes</span></div>
    <div class="text-nav"> <button class="btn-nav"><ion-icon class="icon" name="notifications-outline"></ion-icon></button>Reminders</div>
    <div class="text-nav"> <button class="btn-nav"><ion-icon class="icon" name="pencil-outline"></ion-icon></button>Edit labels</div>
    <div class="text-nav"> <button class="btn-nav"><ion-icon class="icon" name="archive-outline"></ion-icon></button>Archive</div>
    <div class="text-nav"> <button class="btn-nav"><ion-icon class="icon" name="trash-outline"></ion-icon></button>Trash</div>

    </nav>

    <div class="Sub-header">
        
        <div class="note">

            <input type="text" class="note-text" placeholder="Take a note...">
            <div class="box-icon">
            <button class="icon-box"><ion-icon class="icon" name="newspaper-outline"></ion-icon></button>
             <button class="icon-box"><ion-icon class="icon" name="archive-outline"></ion-icon></button>
             <button class="icon-box"><ion-icon class="icon" name="color-palette-outline"></ion-icon></button>
            </div>
        </div>
        
    </div>
    <main>

        <div class="text-body"><h4>You dont have a note</h4></div> 



    </main>

</body>
</html>
